name: Run k6 Load Test

on:
  workflow_dispatch: # allows manual trigger

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Install k6
      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 379CE192D401AB61
          sudo add-apt-repository -y ppa:k6io/k6
          sudo apt-get update
          sudo apt-get install -y k6

      # 3. Run k6 script using secrets
      - name: Run k6 load test
        env:
          SERVICE_URL: ${{ secrets.CONSUMER_API_URL }}
          API_KEY: ${{ secrets.CONSUMER_API_KEY }}
        run: |
          echo "Starting k6 test against $SERVICE_URL"
          k6 run tests/k6/consumer_test.js
